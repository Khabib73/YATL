name: Base API tests with extract
base_url: http://localhost:8000
skip: true

steps:
  - name: Create user and extract ID
    request:
      method: POST
      url: /users
      body:
        json:
          id: 1
          name: Alice
          email: alice@example.com
          password: hackme12345
    expect:
      body:
        json:
          "info.email": "alice@example.com"
          "message": "User created"
      status: 200
    extract:
      user_id: "info.id"

  - name: Get user and extract email
    request:
      method: GET
      url: /users/{{ user_id }}
    expect:
      body:
        json:
          "info.email": "alice@example.com"
      status: 200